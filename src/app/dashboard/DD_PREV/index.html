<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fichas 1:1 · Sistema Compensaciones DD 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --surface:#171b26; --surface2:#1e2433; --border:#2a3044;
  --cyan:#00c9b1; --purple:#8b5cf6; --amber:#f59e0b; --red:#ef4444; --green:#10b981;
  --gray:#6b7280; --muted:#9ca3af; --text:#f1f5f9; --textdim:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:15px}
header{padding:22px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(15,17,23,0.95);z-index:100;backdrop-filter:blur(10px)}
.logo{display:flex;align-items:center;gap:12px}
.logo-mark{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display';font-size:17px;color:white}
.logo-text{font-size:13px;font-weight:600;color:var(--text)}
.logo-sub{font-size:11px;color:var(--gray)}
.header-badge{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(0,201,177,.3);padding:5px 12px;border-radius:20px}
.selector-wrap{padding:28px 40px 0;max-width:1200px;margin:0 auto}
.page-title{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:18px}
.band-tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.band-tab{padding:6px 15px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans';font-size:12px;font-weight:600;letter-spacing:.04em;transition:all .15s}
.band-tab:hover{border-color:var(--cyan);color:var(--cyan)}
.band-tab.active{background:var(--cyan);border-color:var(--cyan);color:var(--bg)}
.person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:9px;margin-bottom:28px}
.person-card{padding:13px 15px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;position:relative}
.person-card:hover{border-color:rgba(0,201,177,.4);transform:translateY(-1px)}
.person-card.active{border-color:var(--cyan);background:rgba(0,201,177,.05)}
.person-card.hidden{display:none}
.pc-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.pc-role{font-size:11px;color:var(--muted);line-height:1.4}
.pc-badges{margin-top:7px;display:flex;gap:4px;flex-wrap:wrap}
.pc-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.04em}
.pc-cr{font-size:11px;color:var(--gray);margin-top:5px}
.action-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:11px;right:11px}
.main{max-width:1200px;margin:0 auto;padding:0 40px 60px}
.empty-state{text-align:center;padding:70px 0;color:var(--gray)}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.35}
.ficha{display:none;animation:fadeIn .22s ease}
.ficha.visible{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ficha-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:16px;flex-wrap:wrap}
.ficha-person{display:flex;align-items:center;gap:12px}
.person-avatar{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display';font-size:17px;font-weight:400;flex-shrink:0}
.person-name{font-family:'DM Serif Display',serif;font-size:21px}
.person-meta{font-size:12px;color:var(--muted);margin-top:2px}
.view-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.toggle-btn{padding:7px 15px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans';font-size:12px;font-weight:600;letter-spacing:.04em;transition:all .15s}
.toggle-btn:hover{border-color:var(--cyan)}
.toggle-btn.active{background:var(--surface2);border-color:var(--cyan);color:var(--cyan)}
.print-btn{padding:7px 15px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'DM Sans';font-size:12px;transition:all .15s}
.print-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.nota-bar{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:9px 15px;margin-bottom:14px;font-size:12px;color:var(--amber)}
.accion-bar{padding:13px 18px;border-radius:9px;margin-bottom:16px;display:flex;align-items:center;gap:12px;border:1px solid}
.accion-icon{font-size:20px}
.accion-label{font-size:13px;font-weight:600}
.accion-sub{font-size:11px;opacity:.75;margin-top:1px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px 18px}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray);margin-bottom:5px}
.kpi-val{font-family:'DM Serif Display',serif;font-size:25px}
.kpi-note{font-size:11px;color:var(--muted);margin-top:3px}
.band-section{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:20px 24px;margin-bottom:14px}
.band-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray);margin-bottom:14px}
.band-bar-wrap{position:relative;margin-bottom:8px}
.band-bar{height:13px;border-radius:7px;background:linear-gradient(90deg,rgba(0,201,177,.12),rgba(139,92,246,.25));position:relative}
.band-marker{position:absolute;top:-5px;width:23px;height:23px;border-radius:50%;border:3px solid var(--bg);transform:translateX(-50%);transition:left .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 10px rgba(0,0,0,.5);cursor:help}
.band-mid-line{position:absolute;top:-5px;bottom:-5px;width:1px;background:rgba(255,255,255,.13)}
.band-mid-lbl{position:absolute;top:-18px;font-size:9px;color:var(--muted);transform:translateX(-50%);white-space:nowrap}
.band-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--gray);margin-top:6px}
.cr-row{display:flex;align-items:center;gap:8px;margin-top:12px}
.cr-chip{font-size:16px;font-weight:700;padding:4px 13px;border-radius:7px}
.cr-arrow{font-size:18px}
.cr-chip-new{font-size:14px;font-weight:600;padding:3px 11px;border-radius:7px}
.cr-note{font-size:11px;color:var(--muted)}
.ajuste-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.ajuste-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:17px 20px}
.ajuste-card.total{border-color:rgba(0,201,177,.3);background:rgba(0,201,177,.04)}
.ajuste-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray);margin-bottom:7px}
.ajuste-pct{font-family:'DM Serif Display',serif;font-size:30px}
.ajuste-usd{font-size:14px;font-weight:600;margin-top:3px}
.ajuste-note{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.55}
.narr-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.narr-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:20px 22px}
.narr-card.lider{border-top:3px solid var(--purple)}
.narr-card.colab{border-top:3px solid var(--cyan)}
.narr-heading{font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.narr-text{font-size:13px;color:var(--textdim);line-height:1.78}
.narr-text strong{color:var(--text)}
.preguntas{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:20px 22px;margin-bottom:14px}
.preguntas-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);margin-bottom:14px}
.pregunta-item{margin-bottom:16px}
.pregunta-item:last-child{margin-bottom:0}
.pregunta-q{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px;display:flex;align-items:flex-start;gap:7px}
.pregunta-q::before{content:"?";color:var(--amber);font-size:13px;flex-shrink:0}
.pregunta-a{font-size:13px;color:var(--textdim);line-height:1.65;padding-left:20px}
.view-lider .colab-only{display:none}
.view-colab .lider-only{display:none}
.view-colab .narr-card.lider{display:none}
.view-colab .preguntas{display:none}
.view-colab .kpi-conf{display:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:768px){
  header,.selector-wrap,.main{padding-left:16px;padding-right:16px}
  .kpi-row{grid-template-columns:1fr 1fr}
  .ajuste-row{grid-template-columns:1fr}
  .narr-row{grid-template-columns:1fr}
}
@media print{
  header,.selector-wrap,.view-controls,.print-btn,.band-tabs,.person-grid{display:none!important}
  body{background:white;color:#111}
  .ficha{display:block!important}
  .kpi,.band-section,.ajuste-card,.narr-card,.preguntas{background:#f9fafb!important;border:1px solid #e5e7eb!important}
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">F</div>
    <div>
      <div class="logo-text">FocalizaHR · Derechos Digitales</div>
      <div class="logo-sub">Sistema de Compensaciones 2026 · Fichas 1:1</div>
    </div>
  </div>
  <div class="header-badge">Fase A · Uso Interno</div>
</header>

<div class="selector-wrap">
  <div class="page-title">Fichas de Conversación Individual</div>
  <div class="page-sub">Selecciona una persona para ver su ficha · <span style="color:var(--cyan)">15 colaboradores · 4 bandas</span></div>
  <div class="band-tabs">
    <button class="band-tab active" onclick="filterBand('all',this)">Todos</button>
    <button class="band-tab" onclick="filterBand('B1',this)">B1 · Dir. Ejecutiva</button>
    <button class="band-tab" onclick="filterBand('B2',this)">B2 · Direcciones</button>
    <button class="band-tab" onclick="filterBand('B3',this)">B3 · Coordinaciones</button>
    <button class="band-tab" onclick="filterBand('B4',this)">B4 · Analistas/Enc.</button>
  </div>
  <div class="person-grid" id="personGrid"></div>
</div>

<div class="main">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">◎</div>
    Selecciona una persona para ver su ficha de conversación
  </div>
  <div id="fichaContainer"></div>
</div>

<script>
const BC={B1:"#f59e0b",B2:"#8b5cf6",B3:"#00c9b1",B4:"#10b981"};
const AC={
  bajo_minimo:{color:"#ef4444",icon:"🔴",label:"Bajo mínimo de banda",sub:"Prioridad alta — requiere plan de convergencia explícito"},
  bajo_target:{color:"#f59e0b",icon:"🟡",label:"Bajo target — convergencia activa",sub:"Ajuste base + mérito aplicado este año"},
  en_posicion:{color:"#10b981",icon:"🟢",label:"En posición — bien ubicado/a",sub:"Solo ajuste base — CR saludable"},
  circulo_rojo:{color:"#6366f1",icon:"🔵",label:"Círculo rojo — sobre midpoint",sub:"No se reduce · Solo ajuste base preservación"}
};

const P=[
  {id:"jc",nombre:"Juan Carlos Lara",cargo:"Co-Director Ejecutivo",pais:"Chile",banda:"B1",nivel:"Senior",ant:13.0,sal:3492,mid:5725,min:4580,max:7100,tcr:1.00,base:2.5,merit:7.0,accion:"bajo_minimo",
  nota:"B1 PRELIMINAR — objetivo de mercado a 2-3 años. Requiere aprobación del Directorio para ajuste completo.",
  nl:"Juan Carlos está significativamente bajo el mínimo de su banda, con CR 0.61. Es la brecha más importante del equipo y requiere una conversación honesta sobre el horizonte de convergencia.\n\nEl ajuste de hoy (2.5% base + 7% mérito = 9.5%) es una señal de dirección, no una corrección completa. La conversación debe establecer que el objetivo B1 es un horizonte de 2-3 años, condicionado al financiamiento y a la aprobación del Directorio.\n\nRecomendación: idealmente tener esta conversación después de la reunión de Directorio donde se presente el memo técnico B1.",
  nc:"Juan Carlos, quiero mostrarte dónde estás en la nueva estructura de compensaciones y ser muy transparente sobre lo que esto implica.\n\nTu rol está en la Banda 1 — Dirección Ejecutiva. El punto de referencia de mercado para este nivel en organizaciones comparables es $5,725 mensuales. Tu remuneración actual está por debajo del mínimo de esta banda.\n\nEsto no es una crítica — es el resultado de años de ajustes sin un sistema formal. La buena noticia es que ahora tenemos un marco claro y una dirección definida. El ajuste de este año es un primer paso concreto en ese camino.",
  preg:[
    {q:"¿Por qué no se corrige todo ahora?",a:"El ajuste completo de B1 requiere aprobación del Directorio y está condicionado al financiamiento. No es una decisión operativa — es de gobernanza. Estamos preparando el memo técnico para presentárselo al Directorio."},
    {q:"¿Cuándo llegaré al midpoint?",a:"Con el modelo actual el horizonte estimado es 2-3 años: Año 1 CR ~0.67, Año 2 ~0.78, Año 3 ~0.89. El objetivo completo depende de aprobación anual."},
    {q:"¿Los demás están en la misma situación?",a:"B1 tiene una situación particular que se trata con el Directorio de forma separada. Los datos individuales son confidenciales."}
  ]},
  {id:"jamila",nombre:"Jamila Venturini",cargo:"Co-Directora Ejecutiva",pais:"Brasil",banda:"B1",nivel:"Senior",ant:6.75,sal:4471,mid:5725,min:4580,max:7100,tcr:1.00,base:2.5,merit:7.0,accion:"bajo_minimo",
  nota:"B1 PRELIMINAR — objetivo de mercado a 2-3 años. Requiere aprobación del Directorio.",
  nl:"Jamila está bajo el mínimo con CR 0.78 — la situación más cercana al mínimo dentro de B1, lo que facilita la conversación de convergencia.\n\nEl ajuste 9.5% total es una señal, no una corrección completa. Enmarcar dentro del proceso de aprobación del Directorio.",
  nc:"Jamila, en la nueva estructura tu rol está en la Banda 1 — Dirección Ejecutiva. El punto de referencia de mercado es $5,725. Hoy estás en $4,471, que es el punto de partida de una convergencia planificada.\n\nEste año aplicamos un ajuste de 9.5% que te acerca al mínimo de la banda. El camino completo requiere que el Directorio apruebe el plan de convergencia B1, que presentaremos en las próximas semanas.",
  preg:[
    {q:"¿Por qué el ajuste es parcial?",a:"La corrección completa de B1 es una decisión del Directorio, no operativa. Estamos preparando el memo técnico con el fundamento completo."},
    {q:"¿Cuándo converjo al midpoint?",a:"Con el modelo actual el horizonte estimado es Año 3 — CR ~1.02."}
  ]},
  {id:"camila",nombre:"Camila Lobato",cargo:"Dir. Operaciones/Finanzas",pais:"Chile",banda:"B2",nivel:"Senior",ant:6.0,sal:2811,mid:3470,min:2670,max:4270,tcr:0.90,base:2.5,merit:6.0,accion:"bajo_target",
  nota:null,
  nl:"Camila tiene perfil Operativo-Interno. Target CR 0.90 → $3,123. CR actual 0.81. El ajuste 8.5% la mueve a ~$3,050, acercándola al target.\n\nLa conversación debe explicar el concepto de perfil funcional con claridad — sin que suene a que su rol vale menos.",
  nc:"Camila, en el nuevo sistema tu rol está en la Banda 2 con perfil de gestión operativa-interna. Dentro de B2, el sistema diferencia entre roles de alta exposición externa y roles de gestión interna como el tuyo. Eso no implica menor importancia — refleja cómo el mercado valora estas funciones de forma diferente.\n\nTu punto de referencia objetivo es $3,123. El ajuste de este año (8.5%) te acerca de forma sustantiva a ese target.",
  preg:[
    {q:"¿Por qué mi target es menor que otros en B2?",a:"El sistema reconoce dos perfiles: estratégico-externo y operativo-interno. El tuyo es operativo — los roles de gestión interna en ONG comparables se ubican en ese rango de mercado. No es jerarquía de importancia, es calibración de mercado."},
    {q:"¿Puedo cambiar de perfil?",a:"Los perfiles se revisan en Fase B cuando se completen los descriptores de cargo formales."}
  ]},
  {id:"catalia",nombre:"Catalia Balla",cargo:"Dir. Comunicaciones",pais:"Chile",banda:"B2",nivel:"Pleno",ant:2.0,sal:2709,mid:3470,min:2670,max:4270,tcr:1.10,base:2.5,merit:6.0,accion:"bajo_target",
  nota:"Brecha significativa — plan de convergencia a 3 años.",
  nl:"Catalia tiene la brecha más importante de B2 estratégico: CR 0.78 con target 1.10. El ajuste 8.5% la mueve a ~$2,939 — sigue significativamente bajo el target.\n\nLa conversación debe reconocer la brecha honestamente y enmarcarla en el plan de convergencia a 3 años.",
  nc:"Catalia, tu rol de Comunicaciones está en Banda 2 con perfil estratégico-externo — uno de los roles donde el mercado paga más dentro de B2, porque hay alta demanda y poca oferta de perfiles con expertise en derechos digitales.\n\nQuiero ser honesto contigo: hay una brecha entre donde estás hoy y donde debería estar tu remuneración. El plan de convergencia lleva 3 años, y el ajuste de este año es el primero de ese camino.",
  preg:[
    {q:"¿Por qué la brecha es tan grande?",a:"Refleja que DD no tuvo un sistema formal de compensaciones y que el mercado de comunicaciones estratégicas digitales creció más rápido que los ajustes internos. El sistema ahora lo visibiliza y tiene un plan para corregirlo."},
    {q:"¿3 años es mucho tiempo?",a:"La convergencia progresiva es la única opción financieramente sostenible para una ONG. Un ajuste completo de golpe comprometería otros proyectos. El modelo garantiza avance cada año condicionado al financiamiento."}
  ]},
  {id:"miguel",nombre:"Miguel Flores",cargo:"Dir. Tecnologías",pais:"Chile",banda:"B2",nivel:"Senior",ant:6.5,sal:2811,mid:3470,min:2670,max:4270,tcr:0.90,base:2.5,merit:6.0,accion:"bajo_target",
  nota:null,
  nl:"Misma situación que Camila Lobato — perfil Operativo, target 0.90, ajuste 8.5%. Importante ser consistente en el mensaje de perfil funcional.",
  nc:"Miguel, tu rol en Tecnologías está en Banda 2 con perfil operativo-interno. El punto de referencia objetivo es $3,123. El ajuste de este año (8.5%) te mueve de $2,811 a aproximadamente $3,050 — acercándote sustantivamente al target.",
  preg:[
    {q:"¿Por qué tecnología es operativo y no estratégico?",a:"El criterio es el grado de representación externa sistemática. El rol de tecnologías en DD es de gestión interna de sistemas. Si el rol evoluciona hacia advisory externo, se revisaría en Fase B."}
  ]},
  {id:"paloma",nombre:"Paloma Lara Castro",cargo:"Dir. Políticas Públicas",pais:"Paraguay",banda:"B2",nivel:"Pleno",ant:3.0,sal:3599,mid:3470,min:2670,max:4270,tcr:1.10,base:2.5,merit:0,accion:"en_posicion",
  nota:null,
  nl:"Paloma está prácticamente en posición — CR 1.04 con target 1.10. Solo recibe base 2.5% porque CR > 1.0.\n\nImportante explicar que no recibir mérito no es negativo — significa que ya está bien posicionada.",
  nc:"Paloma, tu situación en el nuevo sistema es una de las más sólidas del equipo. Tu remuneración actual está prácticamente en el target para tu rol — un compa-ratio de 1.04 significa que estás 4% sobre el punto de referencia de mercado.\n\nEl ajuste de este año es el 2.5% base que aplica a todo el equipo. No hay ajuste de mérito adicional porque ya estás bien posicionada — eso es una señal positiva, no negativa.",
  preg:[
    {q:"¿Por qué no recibo ajuste de mérito?",a:"El ajuste de mérito está diseñado para acelerar la convergencia de quienes están más lejos de su target. Tú ya estás en posición, así que el sistema funciona correctamente — te mantiene ahí con el ajuste base."}
  ]},
  {id:"rafael",nombre:"Rafael Bonifaz",cargo:"Liderazgo LARRED",pais:"Ecuador",banda:"B2",nivel:"Senior",ant:4.75,sal:3382,mid:3470,min:2670,max:4270,tcr:1.10,base:2.5,merit:5.0,accion:"bajo_target",
  nota:null,
  nl:"Rafael está cerca del midpoint (CR 0.97) pero su target es 1.10 por perfil estratégico. El ajuste 7.5% lo lleva a ~$3,636, cruzando el midpoint. Conversación positiva.",
  nc:"Rafael, en el nuevo sistema tu rol de liderazgo LARRED está en Banda 2 con perfil estratégico-externo. Tu CR actual de 0.97 está muy cerca del midpoint, y el ajuste de este año (7.5%) te lleva a $3,636 — cruzando el midpoint y acercándote al target de $3,817.",
  preg:[
    {q:"¿Cuándo alcanzo el target completo?",a:"Con el ajuste de este año cruzas el midpoint. El target completo (CR 1.10 = $3,817) se estima alcanzar en el Año 2 con continuidad del modelo."}
  ]},
  {id:"debora",nombre:"Débora Calderón",cargo:"Coord. Incidencia Regional",pais:"Argentina",banda:"B3",nivel:"Senior",ant:4.25,sal:2730,mid:2240,min:1830,max:2650,tcr:1.00,base:2.5,merit:0,accion:"circulo_rojo",
  nota:"Círculo rojo — CR 1.22. No se reduce. Solo ajuste base 2.5%.",
  nl:"Débora es el círculo rojo más significativo de B3 con CR 1.22. Política clara: no se reduce, solo base 2.5%.\n\nLa conversación debe ser honesta — no es penalización, sino que su remuneración superó históricamente el punto de referencia. El camino es que la escala crezca hacia ella.",

let currentView="lider";

function pctPos(v,mn,mx){return Math.max(2,Math.min(97,((v-mn)/(mx-mn))*100))}
function crColor(cr,tcr){if(cr>=1.0)return"#6366f1";if(cr<0.8)return"#ef4444";if(cr<tcr)return"#f59e0b";return"#10b981"}

function renderGrid(){
  document.getElementById("personGrid").innerHTML=P.map(p=>{
    const cr=(p.sal/p.mid).toFixed(2);
    const ac=AC[p.accion];
    const bc=BC[p.banda];
    return`<div class="person-card" id="pc_${p.id}" onclick="select_('${p.id}')">
      <div class="action-dot" style="background:${ac.color}"></div>
      <div class="pc-name">${p.nombre}</div>
      <div class="pc-role">${p.cargo} · ${p.pais}</div>
      <div class="pc-badges">
        <span class="pc-badge" style="background:${bc}22;color:${bc}">${p.banda}</span>
        <span class="pc-badge" style="background:#ffffff10;color:var(--muted)">${p.nivel}</span>
      </div>
      <div class="pc-cr">CR ${cr}x</div>
    </div>`}).join("");
}

function filterBand(band,btn){
  document.querySelectorAll(".band-tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".person-card").forEach(pc=>{
    const p=P.find(x=>"pc_"+x.id===pc.id);
    if(p) pc.classList.toggle("hidden",band!=="all"&&p.banda!==band);
  });
}

function setView(v,btn){
  currentView=v;
  document.querySelectorAll(".toggle-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  const f=document.querySelector(".ficha.visible");
  if(f){f.classList.remove("view-lider","view-colab");f.classList.add("view-"+v)}
}

function select_(id){
  document.querySelectorAll(".person-card").forEach(c=>c.classList.remove("active"));
  document.getElementById("pc_"+id).classList.add("active");
  document.getElementById("emptyState").style.display="none";
  const p=P.find(x=>x.id===id);
  const cr=p.sal/p.mid;
  const pct_total=p.base+p.merit;
  const sal_nuevo=p.sal*(1+pct_total/100);
  const cr_nuevo=sal_nuevo/p.mid;
  const bc=BC[p.banda];
  const ac=AC[p.accion];
  const mid_pct=pctPos(p.mid,p.min,p.max);
  const act_pct=pctPos(p.sal,p.min,p.max);
  const new_pct=pctPos(sal_nuevo,p.min,p.max);
  const tgt_usd=p.mid*p.tcr;
  const pregs=p.preg.map(q=>`<div class="pregunta-item"><div class="pregunta-q">${q.q}</div><div class="pregunta-a">${q.a}</div></div>`).join("");

  document.getElementById("fichaContainer").innerHTML=`
  <div class="ficha visible view-${currentView}" id="f_${id}">
    <div class="ficha-header">
      <div class="ficha-person">
        <div class="person-avatar" style="background:${bc}20;border:1px solid ${bc}40;color:${bc}">${p.banda}</div>
        <div>
          <div class="person-name">${p.nombre}</div>
          <div class="person-meta">${p.cargo} · ${p.pais} · Nivel ${p.nivel} · ${p.ant} años de antigüedad</div>
        </div>
      </div>
      <div class="view-controls">
        <button class="toggle-btn ${currentView==="lider"?"active":""}" onclick="setView('lider',this)">Vista Líder</button>
        <button class="toggle-btn ${currentView==="colab"?"active":""}" onclick="setView('colab',this)">Vista Colaborador/a</button>
        <button class="print-btn" onclick="window.print()">⎙</button>
      </div>
    </div>
    ${p.nota?`<div class="nota-bar">⚑ ${p.nota}</div>`:""}
    <div class="accion-bar" style="background:${ac.color}10;border-color:${ac.color}35">
      <div class="accion-icon">${ac.icon}</div>
      <div><div class="accion-label" style="color:${ac.color}">${ac.label}</div><div class="accion-sub" style="color:${ac.color}">${ac.sub}</div></div>
    </div>
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Salario Actual</div>
        <div class="kpi-val" style="color:var(--textdim)">$${p.sal.toLocaleString()}</div>
        <div class="kpi-note">USD mensuales</div>
      </div>
      <div class="kpi kpi-conf lider-only">
        <div class="kpi-label">Salario Propuesto</div>
        <div class="kpi-val" style="color:var(--cyan)">$${Math.round(sal_nuevo).toLocaleString()}</div>
        <div class="kpi-note">+${pct_total.toFixed(1)}% total</div>
      </div>
      <div class="kpi kpi-conf lider-only">
        <div class="kpi-label">Target USD</div>
        <div class="kpi-val" style="color:${bc}">$${Math.round(tgt_usd).toLocaleString()}</div>
        <div class="kpi-note">CR target ${p.tcr.toFixed(2)}x · Midpoint $${p.mid.toLocaleString()}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Compa-Ratio</div>
        <div class="kpi-val" style="color:${crColor(cr,p.tcr)}">${cr.toFixed(2)}x</div>
        <div class="kpi-note">Posición vs midpoint</div>
      </div>
    </div>
    <div class="band-section">
      <div class="band-title">Posición en Banda ${p.banda} — ${p.min.toLocaleString()} · ${p.mid.toLocaleString()} · ${p.max.toLocaleString()} USD</div>
      <div class="band-bar-wrap">
        <div class="band-bar">
          <div class="band-mid-line" style="left:${mid_pct}%"><div class="band-mid-lbl">Midpoint</div></div>
          <div class="band-marker" style="left:${act_pct}%;background:var(--gray)" title="Actual: $${p.sal.toLocaleString()}"></div>
          <div class="band-marker lider-only" style="left:${new_pct}%;background:var(--cyan)" title="Propuesto: $${Math.round(sal_nuevo).toLocaleString()}"></div>
        </div>
        <div class="band-labels"><span>Mín $${p.min.toLocaleString()}</span><span>Máx $${p.max.toLocaleString()}</span></div>
      </div>
      <div class="cr-row">
        <div class="cr-chip" style="background:${crColor(cr,p.tcr)}18;color:${crColor(cr,p.tcr)}">CR ${cr.toFixed(2)}x actual</div>
        <span class="cr-arrow lider-only" style="color:var(--cyan)">→</span>
        <div class="cr-chip-new lider-only" style="background:rgba(0,201,177,.14);color:var(--cyan)">CR ${cr_nuevo.toFixed(2)}x año 1</div>
        <span class="cr-note lider-only">después del ajuste propuesto</span>
      </div>
    </div>
    <div class="ajuste-row lider-only">
      <div class="ajuste-card">
        <div class="ajuste-label">Ajuste Base</div>
        <div class="ajuste-pct" style="color:var(--muted)">${p.base.toFixed(1)}%</div>
        <div class="ajuste-usd">+ $${Math.round(p.sal*p.base/100).toLocaleString()} / mes</div>
        <div class="ajuste-note">CPI USA 2025 · Aplica a todos · Sobre salario actual</div>
      </div>
      <div class="ajuste-card">
        <div class="ajuste-label">Ajuste Mérito</div>
        <div class="ajuste-pct" style="color:${p.merit>0?"var(--purple)":"var(--gray)"}">${p.merit.toFixed(1)}%</div>
        <div class="ajuste-usd">+ $${Math.round(p.sal*p.merit/100).toLocaleString()} / mes</div>
        <div class="ajuste-note">${p.merit>0?`Matriz J/P/S × CR · Nivel ${p.nivel}`:"CR ≥ 1.0 · Solo ajuste base"}</div>
      </div>
      <div class="ajuste-card total">
        <div class="ajuste-label">Total</div>
        <div class="ajuste-pct">${pct_total.toFixed(1)}%</div>
        <div class="ajuste-usd" style="font-size:15px">$${Math.round(sal_nuevo).toLocaleString()} / mes</div>
        <div class="ajuste-note">Incremento anual: $${Math.round((sal_nuevo-p.sal)*12).toLocaleString()} USD</div>
      </div>
    </div>
    <div class="narr-row">
      <div class="narr-card lider lider-only">
        <div class="narr-heading" style="color:var(--purple)">◈ Guía para el Líder — No mostrar al colaborador/a</div>
        <div class="narr-text">${p.nl.replace(/\n\n/g,"<br><br>").replace(/\n/g,"<br>")}</div>
      </div>
      <div class="narr-card colab">
        <div class="narr-heading" style="color:var(--cyan)">◇ Mensaje para ${p.nombre.split(" ")[0]}</div>
        <div class="narr-text">${p.nc.replace(/\n\n/g,"<br><br>").replace(/\n/g,"<br>")}</div>
      </div>
    </div>
    <div class="preguntas lider-only">
      <div class="preguntas-title">⚠ Preguntas difíciles anticipadas — respuestas sugeridas</div>
      ${pregs}
    </div>
  </div>`;
}

renderGrid();
</script>
</body>
</html>
